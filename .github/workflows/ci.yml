name: CI

on:
  push:
    branches: [main]
    tags: ["v*", "mcp-v*"]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install backend dependencies into repo venv
        run: |
          python3 -m venv .venv
          .venv/bin/pip install -r requirements.txt

      - name: Install mcp dependencies
        run: npm ci
        working-directory: mcp

      - name: Install web dependencies
        run: npm ci
        working-directory: web

      - name: Run verification gates
        run: ./scripts/verify

  publish-mcp:
    needs: verify
    if: startsWith(github.ref, 'refs/tags/mcp-v') || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: mcp
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: mcp/package-lock.json

      - run: npm ci

      - run: npm run typecheck

      - run: npm run build

      - run: npm audit --omit=dev

      - name: Publish if version is new
        run: |
          PKG=$(node -p "require('./package.json').name")
          VER=$(node -p "require('./package.json').version")
          if npm view "$PKG@$VER" version 2>/dev/null | grep -qx "$VER"; then
            echo "$PKG@$VER already on npm; skipping publish"
          else
            npm publish --provenance
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
